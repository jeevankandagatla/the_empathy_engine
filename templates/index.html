<!DOCTYPE html>
<html>
<head>
    <title>Empathy Engine Chat</title>
    <style>
        body {
            font-family: Arial;
            background: #ece5dd;
            display: flex;
            justify-content: center;
        }

        .chat-box {
            width: 420px;
            background: #fff;
            padding: 12px;
            border-radius: 10px;
            margin-top: 30px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        .messages {
            height: 420px;
            overflow-y: auto;
            margin-bottom: 10px;
        }

        .msg {
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 85%;
        }

        .user {
            background: #dcf8c6;
            margin-left: auto;
            text-align: right;
        }

        .bot {
            background: #f1f0f0;
            text-align: left;
        }

        input {
            width: 68%;
            padding: 8px;
        }

        button {
            padding: 6px 10px;
            margin-top: 5px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background: #4CAF50;
            color: white;
        }

        button:hover {
            background: #45a049;
        }

        .controls {
            margin-top: 8px;
            display: flex;
            gap: 10px;
        }

        audio {
            width: 100%;
            margin-top: 5px;
        }
    </style>
</head>

<body>

<div class="chat-box">
    <div class="messages" id="messages"></div>

    <input type="text" id="text" placeholder="Type message...">
    <button onclick="sendMessage()">Send</button>
</div>

<script>

function sendMessage() {
    let text = document.getElementById("text").value;
    if (!text) return;

    let messages = document.getElementById("messages");

    messages.innerHTML += `<div class="msg user">${text}</div>`;

    fetch("/process", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ text: text })
    })
    .then(res => res.json())
    .then(data => {

        let audioIds = [];
        let html = `<div class="msg bot">`;

        data.audio_files.forEach((file, index) => {
            let id = "audio_" + Date.now() + "_" + index;
            audioIds.push(id);

            html += `
                <audio id="${id}" controls preload="auto">
                    <source src="${file}?t=${new Date().getTime()}" type="audio/wav">
                </audio>
            `;
        });

        // ✅ FIXED CONTROLS (VISIBLE)
        html += `
            <div class="controls">
                <button onclick='playAll(${JSON.stringify(audioIds)})'>▶ Play All</button>
                <a href="${data.audio_files[0]}" download>
                    <button>⬇ Download</button>
                </a>
            </div>
        </div>`;

        messages.innerHTML += html;

        // Auto play
        playAll(audioIds);

        document.getElementById("text").value = "";
        messages.scrollTop = messages.scrollHeight;
    });
}


function playAll(ids) {
    let i = 0;

    function playNext() {
        if (i >= ids.length) return;

        let audio = document.getElementById(ids[i]);

        audio.currentTime = 0;
        audio.load();

        audio.play().catch(() => {
            console.log("Autoplay blocked");
        });

        audio.onended = () => {
            setTimeout(() => {
                i++;
                playNext();
            }, 300);
        };
    }

    playNext();
}

</script>

</body>
</html>
